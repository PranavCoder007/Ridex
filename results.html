<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results – RideEx</title>
    <meta name="description" content="Bikes matching your custom configuration on RideEx." />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .results-page {
            padding-top: 80px;
            min-height: 100vh;
        }

        .results-header {
            padding: 3rem 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .config-summary-card {
            background: linear-gradient(135deg, rgba(255, 77, 0, 0.08), rgba(255, 149, 0, 0.04));
            border: 1px solid var(--border-accent);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .config-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .config-chip {
            padding: 0.3rem 0.75rem;
            background: var(--accent-glow);
            border: 1px solid var(--border-accent);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-light);
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .controls-row .search-container {
            flex: 1;
            min-width: 250px;
        }
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-logo">
            <div class="nav-logo-icon">🏍</div>
            <span class="nav-logo-text">RideEx</span>
        </a>
        <ul class="nav-links">
            <li><a href="motorcycle.html">Motorcycles</a></li>
            <li><a href="scooter.html">Scooters</a></li>
            <li><a href="builder.html">Build Your Bike</a></li>
        </ul>
        <a href="builder.html" class="btn btn-ghost" style="padding:0.6rem 1.25rem; font-size:0.85rem;">← Rebuild</a>
    </nav>

    <div class="results-page">
        <div class="results-header">
            <a href="builder.html" class="back-btn">← Back to Builder</a>
            <div class="section-tag">🎯 Your Matches</div>
            <h1 style="margin-bottom:0.5rem;">Bikes Matching <span class="gradient-text">Your Build</span></h1>
            <p style="color:var(--text-secondary); margin-bottom:1.5rem;">Ranked by how closely they match your custom
                configuration.</p>

            <!-- Config Summary -->
            <div class="config-summary-card" id="config-summary-card" style="display:none;">
                <div>
                    <div
                        style="font-size:0.8rem; color:var(--text-muted); margin-bottom:0.5rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;">
                        Your Configuration</div>
                    <div class="config-chips" id="config-chips"></div>
                </div>
                <a href="builder.html" class="btn btn-ghost" style="font-size:0.85rem; padding:0.5rem 1rem;">Modify
                    →</a>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="controls-row">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="search-input" placeholder="Filter results..." />
                </div>
                <select class="filter-select" id="sort-select">
                    <option value="match">Sort: Best Match</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="rating">Highest Rated</option>
                </select>
            </div>

            <div class="results-count" id="results-count"></div>
            <div class="bikes-grid" id="bikes-grid"></div>
        </div>
    </div>

    <!-- POPUP -->
    <div class="popup-overlay" id="popup-overlay">
        <div class="popup-card" id="popup-card">
            <button class="popup-close" id="popup-close" aria-label="Close">✕</button>
            <div class="popup-gallery">
                <img id="popup-img" src="" alt="Bike" />
                <div class="popup-gallery-overlay"></div>
            </div>
            <div class="popup-body">
                <div class="popup-header">
                    <div class="popup-brand" id="popup-brand"></div>
                    <div class="popup-name" id="popup-name"></div>
                    <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap; margin-top:0.5rem;">
                        <div class="popup-price" id="popup-price"></div>
                        <div class="popup-overall-rating">
                            <span class="stars" id="popup-stars"></span>
                            <span class="rating-num" id="popup-rating-num"></span>
                        </div>
                    </div>
                </div>
                <div style="margin-bottom:1rem;">
                    <div
                        style="font-size:0.8rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem; font-weight:600;">
                        Variant</div>
                    <div class="variant-selector" id="popup-variants"></div>
                </div>
                <div style="margin-bottom:1.5rem;">
                    <div
                        style="font-size:0.8rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem; font-weight:600;">
                        Color</div>
                    <div class="color-picker" id="popup-colors"></div>
                    <div class="color-name" id="popup-color-name"></div>
                </div>
                <div class="popup-tabs">
                    <button class="popup-tab active" data-tab="specs" id="tab-specs">Specs</button>
                    <button class="popup-tab" data-tab="ratings" id="tab-ratings">Ratings</button>
                    <button class="popup-tab" data-tab="reviews" id="tab-reviews">Reviews</button>
                    <button class="popup-tab" data-tab="proscons" id="tab-proscons">Pros & Cons</button>
                </div>
                <div class="popup-tab-content active" id="tab-content-specs">
                    <div class="specs-grid" id="popup-specs-grid"></div>
                </div>
                <div class="popup-tab-content" id="tab-content-ratings">
                    <div class="feature-ratings" id="popup-ratings"></div>
                </div>
                <div class="popup-tab-content" id="tab-content-reviews">
                    <div class="reviews-list" id="popup-reviews"></div>
                </div>
                <div class="popup-tab-content" id="tab-content-proscons">
                    <div class="pros-cons">
                        <ul class="pros-list" id="popup-pros"></ul>
                        <ul class="cons-list" id="popup-cons"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/popup.js"></script>
    <script src="js/results.js"></script>
    <script>
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
        });
        initResultsPage('results');
    </script>
</body>

</html>
